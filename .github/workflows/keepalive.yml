name: keepalive

# Keeps the free-tier services warm so there is no cold start during a demo:
#   - pinging /health keeps the Render free web service awake (it idles after ~15 min)
#   - pinging /stats runs a graph query, which keeps Neo4j Aura Free from pausing (~3 days idle)
# Set the repo variable BACKEND_URL to your Render URL:  gh variable set BACKEND_URL --body "https://...onrender.com"
# Use a PUBLIC repo so Actions minutes are unlimited (free).

on:
  schedule:
    - cron: "*/14 * * * *"   # every 14 minutes
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend
        run: |
          URL="${{ vars.BACKEND_URL }}"
          if [ -z "$URL" ]; then echo "BACKEND_URL variable not set yet; skipping"; exit 0; fi
          echo "pinging $URL"
          curl -fsS --max-time 90 "$URL/health" && echo
          curl -fsS --max-time 90 "$URL/stats" >/dev/null && echo "ok"
